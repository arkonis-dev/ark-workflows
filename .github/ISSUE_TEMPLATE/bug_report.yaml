name: Bug Report
description: Report a bug in ark-workflows
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call workflow X with inputs Y
        2. See error: ...
    validations:
      required: true

  - type: input
    id: workflow-name
    attributes:
      label: Workflow name
      placeholder: "go-ci.yml / docker-build-push.yml / ..."
    validations:
      required: true

  - type: input
    id: caller-repo
    attributes:
      label: Caller repo
      placeholder: "arkonis-dev/ark"
    validations:
      required: true

  - type: textarea
    id: run-link
    attributes:
      label: Link to failing run
      description: Paste a URL to the GitHub Actions run if it is public.

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [Code of Conduct](https://github.com/arkonis-dev/ark-workflows/blob/main/CODE_OF_CONDUCT.md)
          required: true
