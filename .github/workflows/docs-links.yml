name: Docs Dead Links

on:
  workflow_call:
    inputs:
      docs-path:
        description: 'Glob pattern for files to check'
        required: false
        type: string
        default: './docs/**/*.md'

jobs:
  lychee:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install lychee
        run: |
          curl -sL https://github.com/lycheeverse/lychee/releases/latest/download/lychee-x86_64-unknown-linux-gnu.tar.gz | tar -xz lychee
          sudo mv lychee /usr/local/bin/

      - name: Check links
        run: |
          lychee \
            --verbose \
            --no-progress \
            --exclude-loopback \
            --exclude 'localhost' \
            --exclude 'example\.com' \
            --timeout 30 \
            --output lychee-report.md \
            '${{ inputs.docs-path }}'

      - name: Open issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "Dead links found in docs" \
            --body-file lychee-report.md \
            --label "docs"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
