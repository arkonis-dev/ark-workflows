name: Helm Sync Operator Version

on:
  workflow_call:
    inputs:
      version:
        description: New operator version without v prefix. Leave empty to fetch latest from source-repo.
        required: false
        type: string
        default: ''
      source-repo:
        description: GitHub repo to fetch latest release from when version is empty (e.g. arkonis-dev/ark)
        required: false
        type: string
        default: arkonis-dev/ark
      charts-path:
        description: Path to the charts directory
        type: string
        default: charts
      chart-name:
        description: Name of the chart directory under charts-path
        type: string
        default: ark

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: upstream
        run: |
          NEW="${{ inputs.version }}"
          if [ -z "$NEW" ]; then
            NEW=$(curl -sf https://api.github.com/repos/${{ inputs.source-repo }}/releases/latest \
              | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: Check current versions
        id: current
        run: |
          CHART=${{ inputs.charts-path }}/${{ inputs.chart-name }}/Chart.yaml
          VALUES=${{ inputs.charts-path }}/${{ inputs.chart-name }}/values.yaml
          APP=$(grep '^appVersion:' "$CHART" | awk '{print $2}' | tr -d '"')
          AGENT=$(grep 'ark-worker:' "$VALUES" | sed 's|.*ark-worker:||' | tr -d ' ')
          echo "appVersion=${APP}" >> "$GITHUB_OUTPUT"
          echo "agentImage=${AGENT}" >> "$GITHUB_OUTPUT"

      - name: Skip if already up to date
        if: steps.upstream.outputs.version == steps.current.outputs.appVersion && steps.upstream.outputs.version == steps.current.outputs.agentImage
        run: echo "Chart already at ${{ steps.current.outputs.appVersion }}, nothing to do."

      - name: Bump versions
        if: steps.upstream.outputs.version != steps.current.outputs.appVersion || steps.upstream.outputs.version != steps.current.outputs.agentImage
        env:
          NEW: ${{ steps.upstream.outputs.version }}
        run: |
          CHART=${{ inputs.charts-path }}/${{ inputs.chart-name }}/Chart.yaml
          VALUES=${{ inputs.charts-path }}/${{ inputs.chart-name }}/values.yaml

          sed -i "s/^appVersion:.*/appVersion: \"${NEW}\"/" "$CHART"

          CURRENT_CHART=$(grep '^version:' "$CHART" | awk '{print $2}')
          MAJOR=$(echo "$CURRENT_CHART" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_CHART" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_CHART" | cut -d. -f3)
          sed -i "s/^version:.*/version: ${MAJOR}.${MINOR}.$((PATCH + 1))/" "$CHART"

          sed -i "s|ark-worker:[^ ]*|ark-worker:${NEW}|" "$VALUES"

      - name: Push branch and open PR
        if: steps.upstream.outputs.version != steps.current.outputs.appVersion || steps.upstream.outputs.version != steps.current.outputs.agentImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.upstream.outputs.version }}
        run: |
          BRANCH="chore/bump-operator-${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ${{ inputs.charts-path }}/${{ inputs.chart-name }}/Chart.yaml \
                  ${{ inputs.charts-path }}/${{ inputs.chart-name }}/values.yaml
          git commit -m "bump: appVersion to ${NEW}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump ark to ${NEW}" \
            --body "Automated version sync: appVersion → \`${NEW}\`" \
            --head "$BRANCH" \
            --base main \
            --label "automated" 2>/dev/null || echo "PR already open, branch updated."
