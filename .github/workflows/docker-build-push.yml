name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image:
        description: Full image name (e.g. ghcr.io/arkonis-dev/ark)
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile relative to context
        required: true
        type: string
      context:
        description: Docker build context path
        type: string
        default: .
      platforms:
        description: Comma-separated target platforms
        type: string
        default: linux/amd64,linux/arm64
      extra-repo:
        description: "org/repo to check out into extra-repo-path (optional)"
        type: string
        default: ""
      extra-repo-path:
        description: Local path for the extra repo checkout
        type: string
        default: ""
      checkout-path:
        description: Subdirectory to check out the caller repo into (optional)
        type: string
        default: ""
      tag-suffix:
        description: Suffix appended to the version tag (e.g. -runtime)
        type: string
        default: ""
      build-args:
        description: "Newline-separated Docker build-arg values (e.g. VERSION=1.2.3)"
        type: string
        default: ""
    outputs:
      image-tag:
        description: The version tag that was pushed (e.g. 0.1.0)
        value: ${{ jobs.build.outputs.image-tag }}
    secrets:
      GHCR_TOKEN:
        required: true
      GHCR_USERNAME:
        required: true

env:
  GRYPE_VERSION: v0.110.0

jobs:
  build:
    name: Build ${{ inputs.image }}
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.version }}
    permissions:
      contents: read

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.checkout-path || '.' }}

      - name: Checkout extra repo
        if: inputs.extra-repo != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.extra-repo }}
          path: ${{ inputs.extra-repo-path }}

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: scan-image:local
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save scan-image:local -o /tmp/image.tar

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: docker-image-${{ github.run_id }}
          path: /tmp/image.tar

  scan:
    name: Scan ${{ inputs.image }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: docker-image-${{ github.run_id }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Install grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin ${{ env.GRYPE_VERSION }}
          grype version

      - name: Scan image for CVEs
        run: grype scan-image:local --fail-on high --quiet

  push:
    name: Push ${{ inputs.image }}
    runs-on: ubuntu-latest
    needs: [build, scan]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.checkout-path || '.' }}

      - name: Checkout extra repo
        if: inputs.extra-repo != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.extra-repo }}
          path: ${{ inputs.extra-repo-path }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push multi-arch
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ inputs.image }}:${{ needs.build.outputs.image-tag }}${{ inputs.tag-suffix }}
            ${{ inputs.image }}:latest${{ inputs.tag-suffix }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.build.outputs.image-tag }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
