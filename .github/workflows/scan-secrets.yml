name: Scan Secrets

on:
  workflow_call: {}

env:
  TRUFFLEHOG_VERSION: v3.88.2

jobs:
  scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so trufflehog can scan all commits on the branch

      - name: Install trufflehog
        run: |
          curl -fsSL \
            "https://github.com/trufflesecurity/trufflehog/releases/download/${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin trufflehog
          trufflehog --version

      - name: Scan for secrets
        run: |
          trufflehog git "file://$(pwd)" \
            --only-verified \
            --fail \
            --no-update
